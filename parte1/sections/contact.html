<section class="contact">
  <div class="container">

    <div class="section-head">
      <span class="section-tag">Contact Us</span>
      <p class="section-desc">Connect with Us: Let's Discuss Your Digital Marketing Needs</p>
    </div>

    <div class="contact__grid">

      <!-- Left: decorative illustration -->
      <div class="contact__visual">
        <svg viewBox="0 0 340 400" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Stars / sparkles -->
          <path d="M170 40 L174 58 L192 62 L174 66 L170 84 L166 66 L148 62 L166 58Z" fill="#191A23"/>
          <path d="M60 120 L63 132 L75 135 L63 138 L60 150 L57 138 L45 135 L57 132Z" fill="#191A23"/>
          <path d="M280 90 L283 102 L295 105 L283 108 L280 120 L277 108 L265 105 L277 102Z" fill="#191A23"/>
          <path d="M40 260 L42 270 L52 272 L42 274 L40 284 L38 274 L28 272 L38 270Z" fill="#B9FF66"/>
          <path d="M300 200 L302 210 L312 212 L302 214 L300 224 L298 214 L288 212 L298 210Z" fill="#B9FF66"/>
          <path d="M200 320 L202 330 L212 332 L202 334 L200 344 L198 334 L188 332 L198 330Z" fill="#191A23"/>

          <!-- Central planet -->
          <circle cx="170" cy="210" r="80" fill="#191A23"/>
          <ellipse cx="170" cy="210" rx="120" ry="24" fill="none" stroke="#B9FF66" stroke-width="3"/>
          <circle cx="170" cy="210" r="80" fill="#191A23"/>
          <!-- craters -->
          <circle cx="145" cy="190" r="12" fill="#2d2e3a"/>
          <circle cx="190" cy="225" r="8" fill="#2d2e3a"/>
          <circle cx="165" cy="235" r="5" fill="#2d2e3a"/>
          <!-- highlight -->
          <circle cx="150" cy="185" r="20" fill="#3a3b4a" opacity=".5"/>

          <!-- Floating elements -->
          <rect x="20" y="160" width="70" height="44" rx="14" fill="#B9FF66" stroke="#191A23" stroke-width="1.5"/>
          <rect x="30" y="172" width="50" height="8" rx="4" fill="#191A23" opacity=".5"/>
          <rect x="30" y="186" width="35" height="6" rx="3" fill="#191A23" opacity=".3"/>

          <rect x="250" y="290" width="70" height="44" rx="14" fill="#191A23"/>
          <rect x="260" y="302" width="50" height="8" rx="4" fill="#B9FF66" opacity=".6"/>
          <rect x="260" y="316" width="35" height="6" rx="3" fill="#B9FF66" opacity=".3"/>

          <!-- Dotted orbit -->
          <circle cx="170" cy="210" r="130" stroke="#191A23" stroke-width="1" stroke-dasharray="5 7" fill="none" opacity=".25"/>
        </svg>
      </div>

      <!-- Right: form -->
      <form class="contact__form" novalidate>

        <div class="contact__radios">
          <label class="contact__radio-label">
            <input type="radio" name="intent" value="hi" checked />
            Say Hi
          </label>
          <label class="contact__radio-label">
            <input type="radio" name="intent" value="quote" />
            Get a Quote
          </label>
        </div>

        <div class="contact__field">
          <label class="contact__label" for="c-name">Name</label>
          <input class="contact__input" id="c-name" type="text" placeholder="Name" />
        </div>

        <div class="contact__field">
          <label class="contact__label" for="c-email">Email*</label>
          <input class="contact__input" id="c-email" type="email" placeholder="Email" required />
        </div>

        <div class="contact__field">
          <label class="contact__label" for="c-msg">Message*</label>
          <textarea class="contact__textarea" id="c-msg" placeholder="Message" required></textarea>
        </div>

        <button type="submit" class="btn btn--dark contact__submit">Send Message</button>

      </form>
    </div>

  </div>
</section>
